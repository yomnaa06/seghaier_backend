version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sghaier-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sghaier_db
      MYSQL_USER: sghaier_user
      MYSQL_PASSWORD: sghaier_password
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      timeout: 20s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build: .
    container_name: sghaier-backend
    environment:
      DATABASE_URL: mysql://sghaier_user:sghaier_password@mysql:3306/sghaier_db
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: your-super-secret-jwt-key-change-this
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/dist
      - /app/node_modules

volumes:
  mysql_data: